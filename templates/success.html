<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/success.css') }}">
    <title>Report Saved</title>
</head>

<body>

    <header class="main-header">
        <h1 class="lab-title">
            <img src="{{ url_for('static', filename='img/WaterMark.png') }}" alt="">
            {{ lab_name_en }}
        </h1>
    </header>

    <div class="main-container">
        <div class="success-card">

            <div class="success-icon">✅</div>

            <h2 class="success-title">تم حفظ التقرير بنجاح!</h2>

            {% if analyses_count %}
            <p class="success-message">تم حفظ {{ analyses_count }} تحليل/تحاليل</p>
            {% endif %}

            <p class="success-message">اختر خيار الطباعة:</p>

            <div class="print-buttons">

                {% if analyses_count > 1 %}
                <button class="print-btn print-all" onclick="printAll()">
                    📄 Print All Analyses ({{ analyses_count }} Tests)
                </button>
                <p style="font-size: 14px; color: var(--text-muted); margin: 15px 0;">- OR -</p>
                {% endif %}

                {% for analysis in analyses_list %}
                <button class="print-btn {% if analysis.is_active %}print-current{% else %}print-individual{% endif %}"
                    onclick="printAnalysis({{ analysis.id }})">
                    🖨️ Print {{ analysis.name }}
                    {% if analysis.is_active %}
                    <span style="font-size: 12px; opacity: 0.8;">(Current)</span>
                    {% endif %}
                </button>
                {% endfor %}

                <button class="print-btn skip-btn" onclick="skipToDashboard()">
                    ⏭️ Skip - Go to Dashboard
                </button>

            </div>
        </div>
    </div>

    <script>
        function printAll() {
            window.open('/pdf/comprehensive/{{ patient_id }}', '_blank');
        }

        function printAnalysis(analysisId) {
            fetch('/pdf/analysis/' + analysisId);
        }

        function skipToDashboard() {
            window.location.href = '/new-report';
        }
    </script>

</body>

</html>
